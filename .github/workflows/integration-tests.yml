name: Integration Tests

on:
  push:
    branches:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: true
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Set up Dependencies
        uses: actions/setup-python@v4
      - name: Install trec-auto-judge from the repo
        working-directory: ${{github.workspace}}
        run: |
          pip3 install .[test]
          pip3 install --no-deps ir_datasets
          pip3 uninstall -y tira
          pip3 install tira

      - name: Test judges/queryonly
        run: |
          export OPENAI_API_KEY=ignore
          export OPENAI_BASE_URL=ignore
          export OPENAI_MODEL=ignore

          tira-cli code-submission \
              --dry-run \
              --path . \
              --cache-behaviour deterministic \
              --mount-cache '$CACHE_DIR=EMPTY_DIR' \
              --forward-environment-variable OPENAI_API_KEY OPENAI_BASE_URL OPENAI_MODEL \
              --task trec-auto-judge \
              --dataset kiddie-20260605-training \
              --command 'auto-judge run --workflow /auto-judge/judges/queryonly/workflow.yml --rag-responses $inputDataset/runs/*/ --rag-topics $inputDataset/topics/*.jsonl --out-dir $outputDir'

