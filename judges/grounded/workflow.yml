# GroundedNuggetJudge: Single-response nugget extraction
#
# Phase 1: Pairwise preference ranking (PrefJudgment) -- for ordering responses
# Phase 2: Grounded nugget extraction from individual responses (GroundedIterativeNuggets)
# Phase 3: Nugget-based grading (GradeNuggetAnswer)

nugget_class: "judges.grounded.groundnugget_judge:GroundNuggetJudge"
judge_class: "judges.prefnugget.prefnugget_judge:PrefNuggetJudge"

create_nuggets: true
judge: true
judge_uses_nuggets: true
nugget_depends_on_responses: true
force_recreate_nuggets: true

settings:
  filebase: "ground-{_name}"
  num_others: 4
  num_pivot: 0
  no_dupes: true
  pref_judge: "ties_allowed"  # must_decide | ties_allowed

nugget_settings:
  num_others: 4
  num_pivot: 0
  no_dupes: true
  on_missing_evals: fix_aggregate
  iterative_nuggets: true
  max_nuggets_per_topic: 20
  stop_collecting_at_nuggets_per_topic: 20
  gen_batch_num_per_query: 2
  max_pairs_considered: 100
  nugget_gen_order: both
  max_questions_per_pair: 2
  random_pairs: false

judge_settings:
  grade_threshold: 4
  grade_text: "response"  # "response" | "document" | "document_paragraphs"

variants:

  # --- Primary variants (ties_allowed, default) ---

  best: &gn-best
    judge_settings:
      grade_text: "response"

  best-docs: &gn-best-docs
    judge_settings:
      grade_text: "document_paragraphs"

  random: &gn-random
    nugget_settings:
      random_pairs: true
    judge_settings:
      grade_text: "response"

  random-docs: &gn-random-docs
    nugget_settings:
      random_pairs: true
    judge_settings:
      grade_text: "document_paragraphs"

  # --- Backward compat (must_decide) ---

  best-decide: &gn-best-decide
    nugget_settings:
      pref_judge: "must_decide"
    judge_settings:
      grade_text: "response"

  best-decide-docs: &gn-best-decide-docs
    nugget_settings:
      pref_judge: "must_decide"
    judge_settings:
      grade_text: "document_paragraphs"

  random-decide: &gn-random-decide
    nugget_settings:
      pref_judge: "must_decide"
      random_pairs: true
    judge_settings:
      grade_text: "response"

  random-decide-docs: &gn-random-decide-docs
    nugget_settings:
      pref_judge: "must_decide"
      random_pairs: true
    judge_settings:
      grade_text: "document_paragraphs"

  # --- Old name aliases (grounded already used ties_allowed, so old names -> ties variants) ---
  ground-response: *gn-best
  ground-docs: *gn-best-docs
  ground-random-response: *gn-random
  ground-random-docs: *gn-random-docs
