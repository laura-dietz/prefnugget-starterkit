# LangChainPrefJudge: preference-based contrastive nugget judge on LangChain
#
# Phase 1: Pairwise preference ranking (must_decide, both orders) -> Borda
# Phase 2: Iterative contrastive nugget extraction (plum: 1 question per pair,
#          1 pair per round) with DECISION POINTS that grow the preference pool
#          when extraction stalls before target_nuggets
# Phase 3: Nugget-based grading (0-5, covered means grade >= grade_threshold)

nugget_class: "judges.langchain_pref.langchain_judge:LangChainPrefJudge"
judge_class: "judges.langchain_pref.langchain_judge:LangChainPrefJudge"

create_nuggets: true
judge: true
nugget_depends_on_responses: true
judge_uses_nuggets: true
force_recreate_nuggets: true

settings:
  filebase: "{_name}"

nugget_settings:
  target_nuggets: 20
  initial_num_others: 2      # start small; decision points grow the pool on demand
  max_questions_per_pair: 1  # plum
  max_pairs_considered: 100
  max_concurrency: 8

judge_settings:
  grade_threshold: 4
  max_concurrency: 8

variants:

  # Faithful imitation of prefnugget best-decide-plum (with pool growth)
  best-decide-plum: {}

  # Quick smoke variant: small targets for fast iteration on kiddie
  smoke:
    nugget_settings:
      target_nuggets: 5
      max_pairs_considered: 20
