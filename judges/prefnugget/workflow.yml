# PrefNuggetJudge: Contrastive nugget extraction from pairwise preference comparisons
#
# Phase 1: Pairwise preference ranking (PrefJudgment)
# Phase 2: Iterative contrastive nugget extraction (IterativeExtractDifferentiatingNuggets)
# Phase 3: Nugget-based grading (GradeNuggetAnswer)

judge_class: "judges.prefnugget.prefnugget_judge:PrefNuggetJudge"
judge_uses_nuggets: true
nugget_depends_on_responses: true
judge: true
create_nuggets: true
augment_report: false

settings:
  filebase: "{_name}"
  num_others: 4
  num_pivot: 0
  no_dupes: true
  on_missing_evals: "fix_aggregate"
  #
  iterative_nuggets: false
  max_nuggets_per_topic: -1
  stop_collecting_at_nuggets_per_topic: 20
  gen_batch_num_per_query: 2
  max_pairs_considered: -1
  nugget_gen_order: "both"
  pref_judge: "must_decide"  # must_decide | ties_allowed

nugget_settings:
  max_questions_per_pair: 5
  random_pairs: false

judge_settings:
  grade_threshold: 4
  grade_text: "response"  # "response" | "document" | "document_paragraphs"

variants:

  # --- Active variants used in the paper ---

  iter20bothties-few:
    settings:
    nugget_settings:
      num_others: 4
      num_pivot: 0
      no_dupes: true
      on_missing_evals: fix_aggregate
      iterative_nuggets: true
      max_nuggets_per_topic: 20
      stop_collecting_at_nuggets_per_topic: 20
      gen_batch_num_per_query: 2
      max_pairs_considered: 100
      nugget_gen_order: both
      max_questions_per_pair: 2
    judge_settings:
      grade_threshold: 4
      grade_text: "response"

  iter20bothties-few-docs:
    settings:
    nugget_settings:
      num_others: 4
      num_pivot: 0
      no_dupes: true
      on_missing_evals: fix_aggregate
      iterative_nuggets: true
      max_nuggets_per_topic: 20
      stop_collecting_at_nuggets_per_topic: 20
      gen_batch_num_per_query: 2
      max_pairs_considered: 100
      nugget_gen_order: both
      max_questions_per_pair: 2
    judge_settings:
      grade_threshold: 4
      grade_text: "document_paragraphs"

  iter20bothties-few-random-pairs:
    settings:
    nugget_settings:
      num_others: 4
      num_pivot: 0
      no_dupes: true
      on_missing_evals: fix_aggregate
      iterative_nuggets: true
      max_nuggets_per_topic: 20
      stop_collecting_at_nuggets_per_topic: 20
      gen_batch_num_per_query: 2
      max_pairs_considered: 100
      nugget_gen_order: both
      max_questions_per_pair: 2
      random_pairs: true
    judge_settings:
      grade_threshold: 4
      grade_text: "response"

  iter20bothties-few-docs-random-pairs:
    settings:
    nugget_settings:
      num_others: 4
      num_pivot: 0
      no_dupes: true
      on_missing_evals: fix_aggregate
      iterative_nuggets: true
      max_nuggets_per_topic: 20
      stop_collecting_at_nuggets_per_topic: 20
      gen_batch_num_per_query: 2
      max_pairs_considered: 100
      nugget_gen_order: both
      max_questions_per_pair: 2
      random_pairs: true
    judge_settings:
      grade_threshold: 4
      grade_text: "document_paragraphs"

  # --- Historical variant (ties_allowed oversight, kept for reproducibility) ---

  iter20bothties:
    iterative_nuggets: true
    nugget_gen_order: "both"
    pref_judge: "ties_allowed"
    gen_batch_num_per_query: 2
    max_pairs_considered: 100
    max_nuggets_per_topic: 20
    stop_collecting_at_nuggets_per_topic: 20
    num_others: 4
    num_pivot: 0
    no_dupes: true
    on_missing_evals: "fix_aggregate"
    nugget_settings:
      max_questions_per_pair: 5
    judge_settings:
      grade_threshold: 4