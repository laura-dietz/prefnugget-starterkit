# QueryOnlyNugget: Parametric nugget generation (no passage grounding)
#
# Phase 2: Query-only nugget generation (IterativeGenerateNuggetQuestionsReportRequest)
# Phase 3: Nugget-based grading (GradeNuggetAnswer)
# (No Phase 1 -- nuggets are generated from the query alone)

nugget_class: "judges.queryonly.rubric_autojudge:RubricJudge"
judge_class: "judges.prefnugget.prefnugget_judge:PrefNuggetJudge"

create_nuggets: true
judge: true
judge_uses_nuggets: true
nugget_depends_on_responses: false  # parametric - no responses needed for nugget creation
force_recreate_nuggets: true

settings:
  filebase: "{_name}"
  max_nuggets_per_topic: 20

nugget_settings:
  prompt: "prefnugget-baseline"

judge_settings:
  grade_threshold: 4

variants:

  # --- Primary variants ---



  response: &qo-response
    nugget_settings:
      prompt: "prefnugget-baseline"
    judge_settings:
      grade_text: "response"

  best-5: 
    nugget_settings:
      prompt: "prefnugget-baseline"
      max_nuggets_per_topic: 5

    judge_settings:
      grade_text: "response"

  best-10: 
    nugget_settings:
      prompt: "prefnugget-baseline"
      max_nuggets_per_topic: 10

    judge_settings:
      grade_text: "response"

  best-15: 
    nugget_settings:
      prompt: "prefnugget-baseline"
      max_nuggets_per_topic: 15

    judge_settings:
      grade_text: "response"


  docs: &qo-docs
    nugget_settings:
      prompt: "prefnugget-baseline"
    judge_settings:
      grade_text: "document_paragraphs"

  resp-and-docs: &qo-resp-and-docs
    nugget_settings:
      prompt: "prefnugget-baseline"
    judge_settings:
      grade_text: "response_and_document_paragraphs"
      grade_threshold: 3

  # --- Old name aliases ---
  prefnugget-rubric-response: *qo-response
  prefnugget-rubric-docs: *qo-docs

  # --- generic names ---
  best: *qo-response
  best-docs: *qo-docs
  best-resp-and-docs: *qo-resp-and-docs
